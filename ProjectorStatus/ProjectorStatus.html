<head>
    <meta charset="UTF-8">
    <title>Projector Status</title>

    <script id="defaultsScriptTag" src="defaults.js"></script>

    <script>

		/**
		 * DISCOPIXEL PRODUCTIONS INC.
		 * D3ProjectorStatus Web Module
		 * Author: A. Robinson
		 * Updated: 28 JUN 2026
		 * Reproduction & Redistribution prohibited without express written permission
		 * © 2026 - All rights reserved
		 */

		const dynamicStyleSheet = document.createElement('style');
		document.head.appendChild(dynamicStyleSheet);

		const prjStatusModuleInternals = {

			settings : {
				showTitle : "",
				showSubtitle: "",
				textColor       : 'white',
				barOutlineColor : 'white',
				barColor        : 'white',
				fontFamily      : 'sans-serif',
				fontSize        : '2em',
				useWeirdFrozenBehavior : false,
			},

			data : {
				1 : {name : '', laser: 0, power: 0, inhib: 1},
				2 : {name : '', laser: 0, power: 0, inhib: 1},
				3 : {name : '', laser: 0, power: 0, inhib: 1},
				4 : {name : '', laser: 0, power: 0, inhib: 1},
				5 : {name : '', laser: 0, power: 0, inhib: 1},
				6 : {name : '', laser: 0, power: 0, inhib: 1},
				7 : {name : '', laser: 0, power: 0, inhib: 1},
				8 : {name : '', laser: 0, power: 0, inhib: 1},
			},

			updatePrjName : function (index, name) {

				if (prjStatusModuleInternals.data[index].name !== name) {
					prjStatusModuleInternals.data[index].name = name;
					prjStatusModuleInternals.updateNames();
				}
			},

			updateLaser : function (index, value) {

				if (prjStatusModuleInternals.data[index].laser !== value) {
					prjStatusModuleInternals.data[index].laser = value;
					prjStatusModuleInternals.pushLaserUpdate(index);
				}
			},

			updatePower : function (index, value) {

				if (prjStatusModuleInternals.data[index].power !== value) {
					prjStatusModuleInternals.data[index].power = value;
					prjStatusModuleInternals.pushPowerUpdate(index);
				}
			},

			updateInhib : function (index, value) {

				if (prjStatusModuleInternals.data[index].inhib !== value) {
					prjStatusModuleInternals.data[index].inhib = value;
					prjStatusModuleInternals.pushInhibUpdate(index);
				}
			},

			updateNames : function () {

				Object.keys(prjStatusModuleInternals.data).forEach((prjNum) => {

					document.getElementById(`prjName_${prjNum}`).innerText = prjStatusModuleInternals.data[prjNum].name;

					if (prjStatusModuleInternals.data[prjNum].name === '') {

						document.getElementById(`prjLaser_${prjNum}`).style.display = 'none';
					} else {

						document.getElementById(`prjLaser_${prjNum}`).style.display = 'block';
					}
				});
			},

			updateStyle : function () {

				const _ = prjStatusModuleInternals.settings;
				const ss = dynamicStyleSheet.sheet;

				ss.insertRule(`.container { color: ${ _.textColor }`, ss.cssRules.length);
				ss.insertRule(`.prj_laser { border-color: ${ _.barOutlineColor }`, ss.cssRules.length);
				ss.insertRule(`.prj_laser_bar { background-color: ${ _.barColor }`, ss.cssRules.length);

				ss.insertRule(`.prj_name { font-family: ${ _.fontFamily }`, ss.cssRules.length);
				ss.insertRule(`.prj_name { font-size: ${ _.fontSize }`, ss.cssRules.length);
				ss.insertRule(`.header { font-family: ${ _.fontFamily }`, ss.cssRules.length);
				ss.insertRule(`.header { font-size: ${ _.fontSize }`, ss.cssRules.length);
				ss.insertRule(`.header { color: ${ _.textColor }`, ss.cssRules.length);
				ss.insertRule(`.prj_laser_val { font-family: ${ _.fontFamily }`, ss.cssRules.length);
				ss.insertRule(`.prj_laser_val { font-size: ${ _.fontSize }`, ss.cssRules.length);
				ss.insertRule(`.prj_power { font-family: ${ _.fontFamily }`, ss.cssRules.length);
				const halfSize = (parseFloat(_.fontSize) / 2) + _.fontSize.replace(/[\d.]/g, '');
				ss.insertRule(`.prj_power { font-size: ${ halfSize }`, ss.cssRules.length);
			},

            updateTitles : function () {
				const _ = prjStatusModuleInternals.settings;
				const ss = dynamicStyleSheet.sheet;

				if (
					_.showTitle ||
                    _.showSubtitle
                ) {
					document.getElementById('header-title').innerText(_.showTitle)
					document.getElementById('header-sub').innerText(_.showSubtitle)

				} else {

					ss.insertRule(`.header { display:none`, ss.cssRules.length);
				}
            },

			pushLaserUpdate : function (index) {

				const laser = (100 * prjStatusModuleInternals.data[index].laser) + '';

				const bar = document.getElementById(`prjLaserBar_${index}`);
				bar.style.width = laser + '%';

				document.getElementById(`prjLaserVal_${index}`).innerText = parseInt(laser, 10) + "%";
			},

			pushInhibUpdate : function (index) {

				const inhib = prjStatusModuleInternals.data[index].inhib;
				const laserContainer = document.getElementById(`prjLaser_${index}`);
				const inhibBar = document.getElementById(`prjInhibBar_${index}`);

				if (prjStatusModuleInternals.settings.useWeirdFrozenBehavior) {

					if (inhib < 0.5) {
						// Force Off
						laserContainer.style.borderColor = 'red';
						inhibBar.style.width = '100%';
						inhibBar.style.backgroundColor = 'rgba(0, 255, 0, 0.5)';
                    } else if (inhib === 0.5) {
						// D3 Control
						laserContainer.style.borderColor = prjStatusModuleInternals.settings.barOutlineColor;
						inhibBar.style.width = '0%';
                    } else {
						// Force On
						laserContainer.style.borderColor = 'green';
						inhibBar.style.width = '100%';
						inhibBar.style.backgroundColor = 'rgba(255, 0, 0, 0.5)';
                    }

                } else {

					if (inhib !== 1) {
						laserContainer.style.borderColor = 'red';
						inhibBar.style.width = ((1 - inhib) * 100) + '%';
					} else {
						laserContainer.style.borderColor = prjStatusModuleInternals.settings.barOutlineColor;
						inhibBar.style.width = '0%';
					}
                }
			},

			pushPowerUpdate : function (index) {

				const raw = Math.round(prjStatusModuleInternals.data[index].power * 255);
				let label, color;

				if (raw <= 63) {
					label = 'STBY';
					color = '#800000';
				} else if (raw <= 191) {
					label = 'IDLE';
					color = '#b5006e';
				} else {
					label = 'ON';
					color = '#008000';
				}

				const el = document.getElementById(`prjPower_${index}`);
				el.innerText = label;
				el.style.backgroundColor = color;
				el.style.display = 'flex';
			},

			loadDefaults : function () {

				document.getElementById('defaultsScriptTag').removeAttribute('src');
				document.getElementById('defaultsScriptTag').setAttribute('src', 'defaults.js');

				prjStatusModuleInternals.settings = {
					... prjStatusModuleInternals.settings,
					... prjStatusModuleDefaults
				};

				prjStatusModuleInternals.updateStyle();
				prjStatusModuleInternals.updateTitles();
			}
		}

		// noinspection ES6ConvertVarToLetConst,JSUnusedGlobalSymbols
		var d3 = {

			// Text Properties
			prjName1: function (textVal) { prjStatusModuleInternals.updatePrjName(1, textVal); },
			prjName2: function (textVal) { prjStatusModuleInternals.updatePrjName(2, textVal); },
			prjName3: function (textVal) { prjStatusModuleInternals.updatePrjName(3, textVal); },
			prjName4: function (textVal) { prjStatusModuleInternals.updatePrjName(4, textVal); },
			prjName5: function (textVal) { prjStatusModuleInternals.updatePrjName(5, textVal); },
			prjName6: function (textVal) { prjStatusModuleInternals.updatePrjName(6, textVal); },
			prjName7: function (textVal) { prjStatusModuleInternals.updatePrjName(7, textVal); },
			prjName8: function (textVal) { prjStatusModuleInternals.updatePrjName(8, textVal); },

			// Number Properties
			prjLaser1: function (value) { prjStatusModuleInternals.updateLaser(1, value) },
			prjLaser2: function (value) { prjStatusModuleInternals.updateLaser(2, value) },
			prjLaser3: function (value) { prjStatusModuleInternals.updateLaser(3, value) },
			prjLaser4: function (value) { prjStatusModuleInternals.updateLaser(4, value) },
			prjLaser5: function (value) { prjStatusModuleInternals.updateLaser(5, value) },
			prjLaser6: function (value) { prjStatusModuleInternals.updateLaser(6, value) },
			prjLaser7: function (value) { prjStatusModuleInternals.updateLaser(7, value) },
			prjLaser8: function (value) { prjStatusModuleInternals.updateLaser(8, value) },

			// Power Properties
			prjPower1: function (value) { prjStatusModuleInternals.updatePower(1, value); },
			prjPower2: function (value) { prjStatusModuleInternals.updatePower(2, value); },
			prjPower3: function (value) { prjStatusModuleInternals.updatePower(3, value); },
			prjPower4: function (value) { prjStatusModuleInternals.updatePower(4, value); },
			prjPower5: function (value) { prjStatusModuleInternals.updatePower(5, value); },
			prjPower6: function (value) { prjStatusModuleInternals.updatePower(6, value); },
			prjPower7: function (value) { prjStatusModuleInternals.updatePower(7, value); },
			prjPower8: function (value) { prjStatusModuleInternals.updatePower(8, value); },

			// Inhib Properties
			prjInhib1: function (value) { prjStatusModuleInternals.updateInhib(1, value); },
			prjInhib2: function (value) { prjStatusModuleInternals.updateInhib(2, value); },
			prjInhib3: function (value) { prjStatusModuleInternals.updateInhib(3, value); },
			prjInhib4: function (value) { prjStatusModuleInternals.updateInhib(4, value); },
			prjInhib5: function (value) { prjStatusModuleInternals.updateInhib(5, value); },
			prjInhib6: function (value) { prjStatusModuleInternals.updateInhib(6, value); },
			prjInhib7: function (value) { prjStatusModuleInternals.updateInhib(7, value); },
			prjInhib8: function (value) { prjStatusModuleInternals.updateInhib(8, value); },

		};

    </script>

    <style>

        .container {
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .header {

            opacity: 0.75;

        .statusContainer {
            width: 100%;
            flex-grow: 1;
            padding: 1rem;
            display: flex;
            min-height: calc(100%/8 - 2em);
        }

        .prj_laser {
            display: inline-block;
            position: relative;
            border: 3px solid;
            border-radius: 1em;
            flex-grow: 1;
            overflow: hidden;
            width: 70%;
        }

        .prj_laser_bar {
            position: absolute;
            height: 200%;
        }

        .prj_inhib_bar {
            position: absolute;
            height: 200%;
            background-color: rgba(255, 0, 0, 0.5);
            right: 0;
        }

        .prj_name {
            min-width: 25%;
            padding-right: 0.5em;
            display: flex;
            align-items: center;
        }

        .prj_laser_val {
            width: 3em;
            flex-shrink: 0;
            padding-right: 0.5em;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .prj_power {
            min-width: 3.5em;
            padding: 0 0.0em;
            margin-right: 1em;
            border-radius: 1em;
            border: 3px solid;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: nowrap;
            background-color: red;
            color: white;
        }

    </style>

</head>
